services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ia
      POSTGRES_USER: ia
      POSTGRES_PASSWORD: ia
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ia -d ia"]
      interval: 10s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:v1.28
    ports:
      - "1025:1025"
      - "8025:8025"

  api:
    build:
      context: ./apps/api
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/ia
      DB_USERNAME: ia
      DB_PASSWORD: ia
      APP_BASE_URL: http://localhost:4200
      APP_FRONTEND_URL: http://localhost:4200
      APP_CORS_ALLOWED_ORIGINS: http://localhost:4200
      APP_MAIL_FROM: no-reply@pht.local
      APP_STORAGE_ROOT: /data/private-assets
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      MAIL_AUTH: "false"
      MAIL_STARTTLS: "false"
      APP_COOKIE_SECURE: "false"
      OCCURRENCE_MATERIALIZATION_HORIZON_DAYS: "365"
      # Change these before any non-local deployment — minimum 32 chars each
      APP_JWT_SECRET: "dev-only-jwt-secret-change-before-any-deployment!!"
      APP_ASSET_SIGNING_SECRET: "dev-only-asset-signing-change-before-any-deployment"
      VAPID_PUBLIC_KEY: "BDOUkFwVwJpDiEi6FqF-wxoto4fqSVuez_DWKLVYHJGzb0VL5JPA-B-1Hy-2lhqPnH-k1RMAi86FXD7jFsgQ4d8"
      VAPID_PRIVATE_KEY: "Hv7MtqykkaWO9xQppsFz99lIG3FATqihBWvs0dYtiLc"
      VAPID_SUBJECT: "mailto:no-reply@pht.local"
    ports:
      - "8080:8080"
    volumes:
      - private-assets:/data/private-assets
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started

  worker:
    build:
      context: ./apps/worker
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/ia
      DB_USERNAME: ia
      DB_PASSWORD: ia
      APP_TIMEZONE: Europe/Paris
      OCCURRENCE_MATERIALIZATION_HORIZON_DAYS: "365"
      VAPID_PUBLIC_KEY: "BDOUkFwVwJpDiEi6FqF-wxoto4fqSVuez_DWKLVYHJGzb0VL5JPA-B-1Hy-2lhqPnH-k1RMAi86FXD7jFsgQ4d8"
      VAPID_PRIVATE_KEY: "Hv7MtqykkaWO9xQppsFz99lIG3FATqihBWvs0dYtiLc"
      VAPID_SUBJECT: "mailto:no-reply@pht.local"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
    ports:
      - "4200:80"
    depends_on:
      - api

  matomo-db:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: matomo
      MARIADB_DATABASE: matomo
      MARIADB_USER: matomo
      MARIADB_PASSWORD: matomo
    volumes:
      - matomo-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "root", "-pmatomo"]
      interval: 10s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:latest
    ports:
      - "8090:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha-dark
    depends_on:
      postgres:
        condition: service_healthy

  matomo:
    image: matomo:5-apache
    ports:
      - "8042:80"
    environment:
      MATOMO_DATABASE_HOST: matomo-db
      MATOMO_DATABASE_ADAPTER: mysql
      MATOMO_DATABASE_DBNAME: matomo
      MATOMO_DATABASE_USERNAME: matomo
      MATOMO_DATABASE_PASSWORD: matomo
    volumes:
      - matomo-data:/var/www/html
    depends_on:
      matomo-db:
        condition: service_healthy

volumes:
  postgres-data:
  private-assets:
  matomo-db-data:
  matomo-data:
