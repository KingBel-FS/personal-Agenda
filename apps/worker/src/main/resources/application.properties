spring.application.name=worker

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ia}
spring.datasource.username=${DB_USERNAME:ia}
spring.datasource.password=${DB_PASSWORD:ia}
spring.datasource.driver-class-name=org.postgresql.Driver

management.endpoints.web.exposure.include=health
app.timezone=${APP_TIMEZONE:Europe/Paris}

# Scheduling thread pool — must be > 1 so jobs don't starve each other
spring.task.scheduling.pool.size=4
holiday.sync.initial-delay-ms=${HOLIDAY_SYNC_INITIAL_DELAY_MS:5000}
holiday.sync.fixed-delay-ms=${HOLIDAY_SYNC_FIXED_DELAY_MS:60000}
holiday.api.base-url=${HOLIDAY_API_BASE_URL:https://calendrier.api.gouv.fr/jours-feries}
occurrence.materialization.initial-delay-ms=${OCCURRENCE_MATERIALIZATION_INITIAL_DELAY_MS:5000}
occurrence.materialization.fixed-delay-ms=${OCCURRENCE_MATERIALIZATION_FIXED_DELAY_MS:60000}
occurrence.materialization.horizon-days=${OCCURRENCE_MATERIALIZATION_HORIZON_DAYS:365}

# Notification scheduling
notification.scheduling.initial-delay-ms=${NOTIFICATION_SCHEDULING_INITIAL_DELAY_MS:10000}
notification.scheduling.fixed-delay-ms=${NOTIFICATION_SCHEDULING_FIXED_DELAY_MS:30000}
notification.scheduling.horizon-hours=${NOTIFICATION_SCHEDULING_HORIZON_HOURS:2}

# Notification sending
notification.sending.initial-delay-ms=${NOTIFICATION_SENDING_INITIAL_DELAY_MS:10000}
notification.sending.fixed-delay-ms=${NOTIFICATION_SENDING_FIXED_DELAY_MS:10000}
notification.sending.batch-size=${NOTIFICATION_SENDING_BATCH_SIZE:50}

# Contextual notifications (streak danger, birthday)
contextual.notification.initial-delay-ms=${CONTEXTUAL_NOTIFICATION_INITIAL_DELAY_MS:30000}
contextual.notification.fixed-delay-ms=${CONTEXTUAL_NOTIFICATION_FIXED_DELAY_MS:60000}

# VAPID (Web Push)
app.vapid.public-key=${VAPID_PUBLIC_KEY}
app.vapid.private-key=${VAPID_PRIVATE_KEY}
app.vapid.subject=${VAPID_SUBJECT:mailto:no-reply@pht.local}
