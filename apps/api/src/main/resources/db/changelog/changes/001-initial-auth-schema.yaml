databaseChangeLog:
  - changeSet:
      id: 001-create-users
      author: codex
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: pseudo
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: password_hash
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: birth_date
                  type: date
                  constraints:
                    nullable: false
              - column:
                  name: geographic_zone
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: account_status
                  type: varchar(30)
                  constraints:
                    nullable: false
              - column:
                  name: profile_photo_url
                  type: varchar(500)
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: activated_at
                  type: timestamp with time zone
        - addUniqueConstraint:
            tableName: users
            columnNames: email
            constraintName: uq_users_email
  - changeSet:
      id: 002-create-consents
      author: codex
      changes:
        - createTable:
            tableName: consents
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: consent_type
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: accepted_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: legal_version
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: ip_hash
                  type: varchar(255)
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: consents
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_consents_user_id
  - changeSet:
      id: 003-create-activation-tokens
      author: codex
      changes:
        - createTable:
            tableName: activation_tokens
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: token
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: expires_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: used_at
                  type: timestamp with time zone
        - addUniqueConstraint:
            tableName: activation_tokens
            columnNames: token
            constraintName: uq_activation_tokens_token
        - addForeignKeyConstraint:
            baseTableName: activation_tokens
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_activation_tokens_user_id
  - changeSet:
      id: 004-create-assets
      author: codex
      changes:
        - createTable:
            tableName: assets
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: uuid
              - column:
                  name: asset_type
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: storage_key
                  type: varchar(500)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: assets
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_assets_user_id
  - changeSet:
      id: 005-create-refresh-tokens
      author: codex
      changes:
        - createTable:
            tableName: refresh_tokens
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: token_hash
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: expires_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: revoked_at
                  type: timestamp with time zone
        - addForeignKeyConstraint:
            baseTableName: refresh_tokens
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_refresh_tokens_user_id
