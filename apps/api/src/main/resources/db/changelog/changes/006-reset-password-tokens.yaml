databaseChangeLog:
  - changeSet:
      id: 006-create-reset-password-tokens
      author: codex
      changes:
        - createTable:
            tableName: reset_password_tokens
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: token_hash
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: expires_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: used_at
                  type: timestamp with time zone
        - addUniqueConstraint:
            tableName: reset_password_tokens
            columnNames: token_hash
            constraintName: uq_reset_password_tokens_token_hash
        - addForeignKeyConstraint:
            baseTableName: reset_password_tokens
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_reset_password_tokens_user_id
