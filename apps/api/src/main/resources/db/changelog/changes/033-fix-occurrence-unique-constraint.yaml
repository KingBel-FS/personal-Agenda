databaseChangeLog:
  - changeSet:
      id: 033-drop-occurrence-unique-constraint-v2
      author: gino
      comment: "Drop strict unique constraint — wake-up override recalculation can legitimately produce same (rule, date, time) for different slots."
      changes:
        - sql:
            sql: >
              DROP INDEX IF EXISTS uq_occurrence_rule_date_time;
              DROP INDEX IF EXISTS uq_occurrence_rule_date_slot;
