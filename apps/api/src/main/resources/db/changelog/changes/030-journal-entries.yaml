databaseChangeLog:
  - changeSet:
      id: 030-create-journal-entries
      author: dev
      changes:
        - createTable:
            tableName: journal_entries
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: entry_date
                  type: date
                  constraints:
                    nullable: false
              - column:
                  name: content
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: journal_entries
            columnNames: user_id, entry_date
            constraintName: uq_journal_entry_user_date
