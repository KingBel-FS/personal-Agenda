databaseChangeLog:
  - changeSet:
      id: 015-create-task-definitions
      author: gino
      changes:
        - createTable:
            tableName: task_definitions
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: title
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: icon
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: text
              - column:
                  name: task_type
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: photo_asset_id
                  type: uuid
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: task_definitions
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_task_definitions_user_id

  - changeSet:
      id: 016-create-task-rules
      author: gino
      changes:
        - createTable:
            tableName: task_rules
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: task_definition_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: day_categories
                  type: varchar(200)
                  constraints:
                    nullable: false
              - column:
                  name: start_date
                  type: date
                  constraints:
                    nullable: false
              - column:
                  name: time_mode
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: fixed_time
                  type: time
              - column:
                  name: wake_up_offset_minutes
                  type: int
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: task_rules
            baseColumnNames: task_definition_id
            referencedTableName: task_definitions
            referencedColumnNames: id
            constraintName: fk_task_rules_task_definition_id
