spring.application.name=api

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ia}
spring.datasource.username=${DB_USERNAME:ia}
spring.datasource.password=${DB_PASSWORD:ia}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
server.tomcat.max-part-count=200

spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS:false}

app.base-url=${APP_BASE_URL:http://localhost:8080}
app.frontend-url=${APP_FRONTEND_URL:http://localhost:4200}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200}
app.mail.from=${APP_MAIL_FROM:no-reply@pht.local}
app.storage.root=${APP_STORAGE_ROOT:./data/private-assets}
app.cookie.secure=${APP_COOKIE_SECURE:false}
# P-03: no default — app will refuse to start if these are not set in the environment
app.asset-signing-secret=${APP_ASSET_SIGNING_SECRET}
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.access-token-minutes=${APP_JWT_ACCESS_TOKEN_MINUTES:15}
app.jwt.refresh-token-days=${APP_JWT_REFRESH_TOKEN_DAYS:30}
occurrence.materialization.horizon-days=${OCCURRENCE_MATERIALIZATION_HORIZON_DAYS:365}
app.vapid.public-key=${VAPID_PUBLIC_KEY}
app.vapid.private-key=${VAPID_PRIVATE_KEY}
app.vapid.subject=${VAPID_SUBJECT:mailto:no-reply@pht.local}
