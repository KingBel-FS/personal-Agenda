<main class="forgot-shell">
  <section class="hero">
    <p class="eyebrow">Personal Habit Tracker</p>
    <h1>Récupère l'accès à ton compte par email.</h1>
    <p class="lede">
      Saisis ton email. Si le compte existe, un lien de réinitialisation est envoyé par mail.
    </p>
  </section>

  <section class="panel" aria-labelledby="forgot-title">
    <h2 id="forgot-title">Mot de passe oublié</h2>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <label>
        Email
        <input type="email" formControlName="email" autocomplete="email" />
      </label>

      <button type="submit" [disabled]="submitting()">
        {{ submitting() ? 'Envoi...' : 'Envoyer le lien' }}
      </button>
    </form>

    @if (successMessage()) {
      <p class="success">{{ successMessage() }}</p>
    }
    @if (errorMessage()) {
      <p class="error">{{ errorMessage() }}</p>
    }

    <nav class="links" aria-label="Liens recovery">
      <a routerLink="/login">Retour à la connexion</a>
    </nav>
  </section>
</main>
