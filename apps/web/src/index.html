<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Personal Habit Tracker</title>
  <base href="/">

  <!-- Viewport & PWA -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2563eb" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Habit Tracker">

  <!-- SEO & description -->
  <meta name="description" content="Personal Habit Tracker — planifiez vos habitudes selon votre rythme de vie réel.">

  <!-- RGAA: langue déjà sur <html lang="fr"> -->

  <!-- Favicon & icons -->
  <link rel="icon" type="image/svg+xml" href="logo.svg">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="logo.svg">

  <!-- Manifest PWA -->
  <link rel="manifest" href="manifest.webmanifest">

  <!-- Inline dark-mode init (évite le flash) -->
  <script>
    (function() {
      var stored = localStorage.getItem('pht_theme');
      if (stored === 'dark' || (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      } else if (stored === 'light') {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
</head>
<body>
  <!-- RGAA 12.7 — Lien d'évitement -->
  <a href="#main-content" class="skip-link">Aller au contenu principal</a>

  <app-root></app-root>
</body>
</html>
